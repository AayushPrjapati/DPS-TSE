<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Grayscale Spectrogram Gradient for a clean paper look -->
    <linearGradient id="gray-spec-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#E5E7EB" />
      <stop offset="70%" stop-color="#9CA3AF" />
      <stop offset="100%" stop-color="#1F2937" />
    </linearGradient>

    <!-- Marker for black arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#000000" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#FFFFFF" />

  <!-- ==================== GRAYSCALE SPECTROGRAMS ==================== -->
  
  <!-- Left Spectrogram Stack (Mixture Y) -->
  <g transform="translate(40, 60)">
    <rect x="-10" y="-10" width="110" height="70" rx="0" fill="url(#gray-spec-grad)" stroke="#000000" stroke-width="0.8" />
    <rect x="-5" y="-5" width="110" height="70" rx="0" fill="url(#gray-spec-grad)" stroke="#000000" stroke-width="0.8" />
    <rect x="0" y="0" width="110" height="70" rx="0" fill="url(#gray-spec-grad)" stroke="#000000" stroke-width="1.2" />
    <!-- Axis lines -->
    <line x1="0" y1="70" x2="110" y2="70" stroke="#000000" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="70" stroke="#000000" stroke-width="1" />
  </g>

  <!-- Middle Spectrogram Stack (Extracted X) -->
  <g transform="translate(340, 60)">
    <rect x="-5" y="-5" width="110" height="70" rx="0" fill="url(#gray-spec-grad)" stroke="#000000" stroke-width="0.8" />
    <rect x="0" y="0" width="110" height="70" rx="0" fill="url(#gray-spec-grad)" stroke="#000000" stroke-width="1.2" />
    <!-- Axis lines -->
    <line x1="0" y1="70" x2="110" y2="70" stroke="#000000" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="70" stroke="#000000" stroke-width="1" />
  </g>

  <!-- Right Spectrogram Stack (Refined X_final) -->
  <g transform="translate(840, 60)">
    <rect x="-5" y="-5" width="110" height="70" rx="0" fill="url(#gray-spec-grad)" stroke="#000000" stroke-width="0.8" />
    <rect x="0" y="0" width="110" height="70" rx="0" fill="url(#gray-spec-grad)" stroke="#000000" stroke-width="1.2" />
    <!-- Axis lines -->
    <line x1="0" y1="70" x2="110" y2="70" stroke="#000000" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="70" stroke="#000000" stroke-width="1" />
  </g>

  <!-- ==================== BLOCKS (Black & White, Times Serif) ==================== -->
  
  <!-- Discriminative Model -->
  <g transform="translate(180, 65)">
    <rect x="0" y="0" width="130" height="60" rx="0" fill="#FFFFFF" stroke="#000000" stroke-width="1.2" />
    <text x="65" y="28" font-family="'Times New Roman', Times, serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Discriminative</text>
    <text x="65" y="45" font-family="'Times New Roman', Times, serif" font-size="13" fill="#000000" text-anchor="middle">Model <tspan font-style="italic">f</tspan><tspan font-size="10" dy="2">φ</tspan><tspan font-size="13" dy="-2">(·)</tspan></text>
  </g>

  <!-- Target Mask Estimator -->
  <g transform="translate(480, 65)">
    <rect x="0" y="0" width="140" height="60" rx="0" fill="#FFFFFF" stroke="#000000" stroke-width="1.2" />
    <text x="70" y="28" font-family="'Times New Roman', Times, serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Target Mask</text>
    <text x="70" y="45" font-family="'Times New Roman', Times, serif" font-size="13" fill="#000000" text-anchor="middle">Estimator</text>
  </g>

  <!-- Joint Guided Diffusion Prior -->
  <g transform="translate(680, 65)">
    <rect x="0" y="0" width="130" height="60" rx="0" fill="#FFFFFF" stroke="#000000" stroke-width="1.2" />
    <text x="65" y="28" font-family="'Times New Roman', Times, serif" font-size="13" font-weight="bold" fill="#000000" text-anchor="middle">Joint Guided</text>
    <text x="65" y="45" font-family="'Times New Roman', Times, serif" font-size="13" fill="#000000" text-anchor="middle">Diffusion Prior</text>
  </g>

  <!-- ==================== LABELS & CAPTIONS ==================== -->
  
  <!-- Left Caption -->
  <text x="95" y="155" font-family="'Times New Roman', Times, serif" font-size="13" fill="#000000" text-anchor="middle">Acoustic Mixture <tspan font-weight="bold">y</tspan><tspan font-size="10" dy="2">mix</tspan></text>

  <!-- Middle Caption -->
  <text x="395" y="155" font-family="'Times New Roman', Times, serif" font-size="13" fill="#000000" text-anchor="middle">Extracted Speech <tspan font-weight="bold">y</tspan><tspan font-size="10" dy="2">disc</tspan></text>

  <!-- Right Caption -->
  <text x="895" y="155" font-family="'Times New Roman', Times, serif" font-size="13" fill="#000000" text-anchor="middle">Refined Speech <tspan font-weight="bold">x</tspan><tspan font-size="10" dy="2">final</tspan></text>

  <!-- Figure Caption -->
  <text x="500" y="295" font-family="'Times New Roman', Times, serif" font-size="14" fill="#000000" text-anchor="middle"><tspan font-weight="bold">Fig. 1.</tspan> Block diagram of the proposed joint mixture-guided target speech extraction pipeline.</text>

  <!-- ==================== ARROWS (Black & White Style) ==================== -->
  
  <!-- Left Spec -> Discriminative Model -->
  <path d="M 152 95 L 178 95" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />

  <!-- Discriminative Model -> Middle Spec -->
  <path d="M 312 95 L 338 95" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />

  <!-- Middle Spec -> Target Mask Estimator -->
  <path d="M 452 95 L 478 95" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />

  <!-- Target Mask Estimator -> Generative Refinement (M) -->
  <path d="M 622 95 L 678 95" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />
  <text x="650" y="87" font-family="'Times New Roman', Times, serif" font-size="12" font-style="italic" fill="#000000" text-anchor="middle">M</text>

  <!-- Generative Refinement -> Right Spec -->
  <path d="M 812 95 L 838 95" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />

  <!-- Top Loop: Middle Spec -> Generative Refinement (diffusion initialization) -->
  <path d="M 395 50 L 395 20 L 745 20 L 745 62" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />
  <text x="570" y="14" font-family="'Times New Roman', Times, serif" font-size="12" fill="#000000" text-anchor="middle"><tspan font-style="italic">y</tspan><tspan font-size="10" dy="2">disc</tspan><tspan font-size="12" dy="-2"> for diffusion initialization</tspan></text>

  <!-- Bottom Loop 1: Left Spec -> Target Mask Estimator -->
  <path d="M 95 132 L 95 220 L 550 220 L 550 128" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />
  
  <!-- Bottom Loop 2: Left Spec -> Generative Refinement -->
  <path d="M 95 220 L 745 220 L 745 128" fill="none" stroke="#000000" stroke-width="1.2" marker-end="url(#arrow)" />
  <text x="320" y="214" font-family="'Times New Roman', Times, serif" font-size="12" fill="#000000" text-anchor="middle"><tspan font-style="italic">y</tspan><tspan font-size="10" dy="2">mix</tspan><tspan font-size="12" dy="-2"> for envelope likelihood constraint</tspan></text>

</svg>
